<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Registration</title>
</head>
<body>
    <h1>Participant Registration</h1>
    <form action="http://localhost:3000/api/participants/register" method="POST" enctype="multipart/form-data">
        <div>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>
        <div>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="institute">Institute:</label>
            <input type="text" id="institute" name="institute" required>
        </div>
        <div>
            <label for="course">Course:</label>
            <input type="text" id="course" name="course" required>
        </div>
        <div>
            <label for="phoneNumber">Phone Number:</label>
            <input type="text" id="phoneNumber" name="phoneNumber" required>
        </div>
        <div>
            <label for="passTier">Pass Tier:</label>
            <input type="text" id="passTier" name="passTier" required>
        </div>
        <div>
            <label for="eventsApplied">Events Applied (comma-separated):</label>
            <input type="text" id="eventsApplied" name="eventsApplied">
        </div>
        <div>
            <label for="paymentSS">Payment Screenshot:</label>
            <input type="file" id="paymentSS" name="paymentSS" accept="image/*" required>
        </div>
        <button type="submit">Register</button>
    </form>
</body>
</html>
